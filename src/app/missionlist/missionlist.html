<h1>SpaceX Mission Launch List</h1>

<div class="main-container">

    <!-- LEFT FILTER -->
    <div class="sidebar">
        <app-missionfilter (filterChanged)="onFilter($event)"></app-missionfilter>
    </div>

    <!-- RIGHT LIST -->
    <div class="list-container">
        <div class="card" *ngFor="let mission of missions" (click)="goToDetails(mission.flight_number)">

        <img [src]="mission.links.mission_patch_small" />

        <div class="info">
            <h2>{{ mission.mission_name }}</h2>
            <p class="year">{{ mission.launch_year }}</p>
            <p>{{ mission.details }}</p>
        </div>

        </div>
    </div>

</div>
